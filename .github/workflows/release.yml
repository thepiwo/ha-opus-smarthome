name: Validate Release

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install and test
        run: |
          uv sync --all-extras
          uv run pytest -v
      - name: Validate HACS
        uses: hacs/action@main
        with:
          category: integration
